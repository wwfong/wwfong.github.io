{% include base_path %}

<!-- start custom head snippets -->

<!-- Force light mode site-wide; overrides OS dark preference and any saved toggle -->
<script>
  (function () {
    try { localStorage.setItem("theme", "light"); } catch (e) {}
    document.documentElement.removeAttribute("data-theme");
  })();
</script>

<!-- Google Fonts: Jost (slim geometric sans) + Geist Mono (for code) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- Support for Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>

<!-- Favicon: 'DF' monogram SVG -->
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<meta name="theme-color" content="#ffffff"/>

<!-- end custom head snippets -->
